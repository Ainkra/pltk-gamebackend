image: node:16

variables:
    API_URL: "https://gitlab.polyptik.com/api/v4/projects/12/jobs/artifacts/main/download?job=build_artefact"
    IMAGE_NAME: "vrombr/race/backend/game-backend"


stages:
    - update_dependencies
    - get_dependancies
    - install
    - test
    - build

cache:
    key: $CI_COMMIT_REF_SLUG
    paths:
        - node_modules/

update_artifact:
    stage: update_dependencies
    trigger:
        project: vrombr/interfaces
        strategy: depend
    only:
        - main

get_artifact:
    stage: get_dependancies
    script:
        - 'curl -L --output build_artefact.zip --header "PRIVATE-TOKEN: $ARTIFACT_TOKEN" "$API_URL"'
        - unzip ./build_artefact.zip
        - rm -rf ./build_artefact.zip
    artifacts:
        when: on_success
        expire_in: 1 day
        paths: 
            - ./interfaces
    tags:
        - runner1
    only:
        - main

install_packages:
    stage: install
    script:
        - npm prune
        - npm install --progress=false
    artifacts:
        name: "$CI_JOB_NAME"
        paths: 
            - node_modules/
        expire_in: 1 hour
    tags:
        - runner1

#run_unit_tests:
#    stage: test
#    script:
#        - npm run test:unit
#    tags: 
#        - runner1

build_docker_image:
    stage: build
    image: docker:20.10.16
    services:
        - docker:20.10.16-dind
    variables:
        DOCKER_TLS_CERTDIR: "/certs"
    before_script:
        - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD registry.gitlab.polyptik.com
        - docker info
    script:
        - docker build -t registry.gitlab.polyptik.com/$IMAGE_NAME:dev-$CI_COMMIT_SHORT_SHA .
        - docker push registry.gitlab.polyptik.com/$IMAGE_NAME:dev-$CI_COMMIT_SHORT_SHA
    tags:
        - runner1
    only:
        - main

